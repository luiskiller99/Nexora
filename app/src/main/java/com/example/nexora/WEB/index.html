<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">

    <style>
        body{

<body>

<h1>📦 Productos</h1>

<div id="productos" class="grid">
    <div class="mensaje">Cargando productos...</div>
</div>

<button id="botonCarrito" class="carrito-fijo" onclick="abrirCarrito()">
    🛒 Carrito <span id="contador" class="badge">0</span>
</button>

<div class="modal" id="carritoModal">
    <div class="modal-content">
        <h2>🛒 Tu pedido</h2>

        <div id="listaCarrito"></div>
        <div id="total" class="total"></div>

        <div class="botones">
            <button class="btn btn-wsp" onclick="comprar()">WhatsApp</button>
            <button class="btn btn-cerrar" onclick="cerrarCarrito()">Cerrar</button>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = "https://xqildyppsdfnzruakwen.supabase.co";
    const API_KEY = "sb_publishable_j07UF5UZxsNJ9kYSNbqWoQ_rXXxL_Fc";

    let carrito = [];

    function resolverImagenUrl(p){
      const raw = (p.imagen_url || "").trim();

      if(!raw) return "https://via.placeholder.com/400x300?text=Sin+Imagen";

      if(raw.includes("/object/sign/Promos/")){
        const archivo = raw.split("/object/sign/Promos/")[1].split("?")[0];
        return `${SUPABASE_URL}/storage/v1/object/public/Promos/${archivo}`;
      }

      if(raw.includes("/object/public/Promos/")) return raw;

      if(raw.startsWith("http")) return raw;

      return `${SUPABASE_URL}/storage/v1/object/public/Promos/${raw}`;
    }

    async function cargarProductos(){
      const cont = document.getElementById("productos");

      try{
        const res = await fetch(`${SUPABASE_URL}/rest/v1/productos?select=*`,{
          headers:{
            apikey:API_KEY,
            Authorization:`Bearer ${API_KEY}`
          }
        });

        const data = await res.json();
        cont.innerHTML = "";

        if(!data.length){
          cont.innerHTML = `<div class="mensaje">No hay productos.</div>`;
          return;
        }

        data.forEach(p=>{
          const nombre = p.nombre || "Producto";
          const precio = Number(p.precio || 0);

          const card = document.createElement("div");
          card.className = "card";

          card.innerHTML = `
            <img src="${resolverImagenUrl(p)}"
                 onerror="this.src='https://via.placeholder.com/400x300?text=Sin+Imagen'">
            <div class="nombre">${nombre}</div>
            <div class="precio">₡${precio}</div>
          `;

          card.onclick = ()=>{
            carrito.push({nombre,precio});
            actualizarContador();
          };

          cont.appendChild(card);
        });

      }catch(e){
        cont.innerHTML = `<div class="mensaje">Error cargando productos</div>`;
      }
    }

    function actualizarContador(){
      document.getElementById("contador").textContent = carrito.length;
    }

    function abrirCarrito(){
      document.getElementById("carritoModal").style.display = "flex";
      document.getElementById("botonCarrito").classList.add("carrito-oculto");
      renderCarrito();
    }

    function cerrarCarrito(){
      document.getElementById("carritoModal").style.display = "none";
      document.getElementById("botonCarrito").classList.remove("carrito-oculto");
    }

    function eliminarProducto(index){
      carrito.splice(index,1);
      actualizarContador();
      renderCarrito();
    }

    function renderCarrito(){
      const lista = document.getElementById("listaCarrito");
      const totalEl = document.getElementById("total");

      lista.innerHTML = "";
      let total = 0;

      if(carrito.length === 0){
        lista.innerHTML = `<div class="mensaje">Tu carrito está vacío</div>`;
      }

      carrito.forEach((item,index)=>{
        total += Number(item.precio);

        const div = document.createElement("div");
        div.className = "item-carrito";

        div.innerHTML = `
          <div class="item-info">${item.nombre} - ₡${item.precio}</div>
          <button class="btn-borrar" onclick="eliminarProducto(${index})">✕</button>
        `;

        lista.appendChild(div);
      });

      totalEl.textContent = `Total: ₡${total}`;
    }

    function comprar(){
      if(carrito.length === 0){
        alert("Tu carrito está vacío");
        return;
      }

      const telefono = "50660238527";

      let mensaje = "Hola, quiero pedir:\n\n";
      let total = 0;

      carrito.forEach(item=>{
        mensaje += `• ${item.nombre} - ₡${item.precio}\n`;
        total += Number(item.precio);
      });

      mensaje += `\nTotal: ₡${total}`;

      window.open(`https://wa.me/${telefono}?text=${encodeURIComponent(mensaje)}`);
    }

    cargarProductos();
    setInterval(cargarProductos,30000);
</script>

</body>
</html>
